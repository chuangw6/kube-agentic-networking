apiVersion: v1
kind: Namespace
metadata:
  name: agentic-net-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentic-net-gw-controller-sa
  namespace: agentic-net-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentic-net-gw-controller-role
rules:
  - apiGroups: [""]
    resources: ["namespaces", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses", "gateways", "httproutes"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses/status", "gateways/status", "httproutes/status"]
    verbs: ["update", "patch"]
  - apiGroups: ["agentic.prototype.x-k8s.io"]
    resources: ["xbackends", "xaccesspolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["agentic.prototype.x-k8s.io"]
    resources: ["xbackends/status", "xaccesspolicies/status"]
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentic-net-gw-controller-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentic-net-gw-controller-role
subjects:
  - kind: ServiceAccount
    name: agentic-net-gw-controller-sa
    namespace: agentic-net-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-net-gw-controller
  namespace: agentic-net-system
  labels:
    app: agentic-net-gw-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentic-net-gw-controller
  template:
    metadata:
      labels:
        app: agentic-net-gw-controller
    spec:
      serviceAccountName: agentic-net-gw-controller-sa
      containers:
        - name: manager
          image: chuangw/agentic-net-gw-controller # TODO: replace with official registry image
          imagePullPolicy: IfNotPresent
          command:
            - "/manager"
          # Let the controller use in-cluster config.
          args:
            - "--kubeconfig="
            - "--master="
            - "--v=4"
